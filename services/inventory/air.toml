root = "."
tmp_dir = "tmp/inventory"

[build]
cmd = "go build -o ./tmp/inventory/server ./services/inventory/cmd/server"
bin = "./tmp/inventory/server"
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "json"]
exclude_dir = ["tmp", ".git", "vendor"]
delay = 500
stop_on_error = true

[log]
time = true
