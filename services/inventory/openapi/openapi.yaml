openapi: 3.0.3
info:
  title: Inventory API
  version: 0.7.1
  description: |
    Authenticated routes use Bearer JWT; `tenant_id` is taken from the token (ARCHITECTURE §6–§7), not `X-Tenant-Id`.
    JSON errors:  via pkg/common/errorcodes. JSON success: via pkg/common/httpresponse (`success`, `data`, `meta.request_id`, list `meta.pagination`).
    Probes `/health`, `/ready`, `/api/v1/inventory/health` use `text/plain`, not §9 JSON.
    POST `/api/v1/inventory/movements/{inbound|outbound|transfer|adjustment}` require header `Idempotency-Key` (ARCHITECTURE §9); replay with the same key and identical raw JSON body returns the existing draft movement.
paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness probe
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/PlainTextOk"
  /ready:
    get:
      operationId: getReady
      summary: Readiness probe (database)
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/PlainTextOk"
        "503":
          description: Database unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/inventory/health:
    get:
      operationId: getInventoryHealth
      summary: Inventory service liveness under API prefix
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/PlainTextOk"
  /api/v1/inventory/categories:
    get:
      operationId: getApiV1InventoryCategories
      tags: [categories]
      summary: List categories
      security:
        - JwtAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Order"
      responses:
        "200":
          description: Paginated categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      operationId: postApiV1InventoryCategories
      tags: [categories]
      summary: Create category
      security:
        - JwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategorySuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
  /api/v1/inventory/categories/{categoryId}:
    parameters:
      - $ref: "#/components/parameters/CategoryId"
    get:
      operationId: getApiV1InventoryCategoriesCategoryId
      tags: [categories]
      summary: Get category by ID
      security:
        - JwtAuth: []
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategorySuccessEnvelope"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: putApiV1InventoryCategoriesCategoryId
      tags: [categories]
      summary: Update category
      security:
        - JwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdateRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategorySuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
    delete:
      operationId: deleteApiV1InventoryCategoriesCategoryId
      tags: [categories]
      summary: Delete category (soft delete when applicable)
      security:
        - JwtAuth: []
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
  /api/v1/inventory/products:
    get:
      operationId: getApiV1InventoryProducts
      tags: [products]
      summary: List products
      security:
        - JwtAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Order"
        - name: category_id
          in: query
          description: Filter by category UUID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      operationId: postApiV1InventoryProducts
      tags: [products]
      summary: Create product
      security:
        - JwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
  /api/v1/inventory/products/{productId}:
    parameters:
      - $ref: "#/components/parameters/ProductId"
    get:
      operationId: getApiV1InventoryProductsProductId
      tags: [products]
      summary: Get product by ID
      security:
        - JwtAuth: []
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSuccessEnvelope"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: putApiV1InventoryProductsProductId
      tags: [products]
      summary: Update product
      security:
        - JwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdateRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
    delete:
      operationId: deleteApiV1InventoryProductsProductId
      tags: [products]
      summary: Delete product (soft delete)
      security:
        - JwtAuth: []
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
  /api/v1/inventory/products/{productId}/restore:
    parameters:
      - $ref: "#/components/parameters/ProductId"
    post:
      operationId: postApiV1InventoryProductsProductIdRestore
      tags: [products]
      summary: Restore soft-deleted product
      security:
        - JwtAuth: []
      responses:
        "200":
          description: Restored product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSuccessEnvelope"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
  /api/v1/inventory/warehouses:
    get:
      operationId: getApiV1InventoryWarehouses
      tags: [warehouses]
      summary: List warehouses
      security:
        - JwtAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Order"
      responses:
        "200":
          description: Paginated warehouses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarehouseListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      operationId: postApiV1InventoryWarehouses
      tags: [warehouses]
      summary: Create warehouse
      security:
        - JwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarehouseCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarehouseSuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
  /api/v1/inventory/warehouses/{warehouseId}:
    parameters:
      - $ref: "#/components/parameters/WarehouseId"
    get:
      operationId: getApiV1InventoryWarehousesWarehouseId
      tags: [warehouses]
      summary: Get warehouse by ID
      security:
        - JwtAuth: []
      responses:
        "200":
          description: Warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarehouseSuccessEnvelope"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: putApiV1InventoryWarehousesWarehouseId
      tags: [warehouses]
      summary: Update warehouse
      security:
        - JwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarehouseUpdateRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarehouseSuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
    delete:
      operationId: deleteApiV1InventoryWarehousesWarehouseId
      tags: [warehouses]
      summary: Delete warehouse
      security:
        - JwtAuth: []
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
  /api/v1/inventory/movements:
    get:
      operationId: getApiV1InventoryMovements
      tags: [movements]
      summary: List movements
      security:
        - JwtAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Search"
        - name: type
          in: query
          schema:
            type: string
            enum: [inbound, outbound, transfer, adjustment]
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, confirmed, cancelled]
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Order"
      responses:
        "200":
          description: Paginated movements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovementListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/v1/inventory/movements/{movementId}:
    parameters:
      - $ref: "#/components/parameters/MovementId"
    get:
      operationId: getApiV1InventoryMovementsMovementId
      tags: [movements]
      summary: Get movement with lines
      security:
        - JwtAuth: []
      responses:
        "200":
          description: Movement detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovementSuccessEnvelope"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/inventory/movements/inbound:
    post:
      operationId: postApiV1InventoryMovementsInbound
      tags: [movements]
      summary: Create draft inbound movement
      security:
        - JwtAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InboundMovementCreateRequest"
      responses:
        "201":
          description: Created draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovementSuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
  /api/v1/inventory/movements/outbound:
    post:
      operationId: postApiV1InventoryMovementsOutbound
      tags: [movements]
      summary: Create draft outbound movement
      security:
        - JwtAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutboundMovementCreateRequest"
      responses:
        "201":
          description: Created draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovementSuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
  /api/v1/inventory/movements/transfer:
    post:
      operationId: postApiV1InventoryMovementsTransfer
      tags: [movements]
      summary: Create draft transfer movement
      security:
        - JwtAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferMovementCreateRequest"
      responses:
        "201":
          description: Created draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovementSuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
  /api/v1/inventory/movements/adjustment:
    post:
      operationId: postApiV1InventoryMovementsAdjustment
      tags: [movements]
      summary: Create draft adjustment movement
      description: Set exactly one of source_warehouse_id (decrease) or destination_warehouse_id (increase).
      security:
        - JwtAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustmentMovementCreateRequest"
      responses:
        "201":
          description: Created draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovementSuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
  /api/v1/inventory/movements/{movementId}/confirm:
    parameters:
      - $ref: "#/components/parameters/MovementId"
    post:
      operationId: postApiV1InventoryMovementsMovementIdConfirm
      tags: [movements]
      summary: Confirm draft movement (apply stock, audit, outbox)
      security:
        - JwtAuth: []
      responses:
        "200":
          description: Confirmed movement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovementSuccessEnvelope"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
  /api/v1/inventory/movements/{movementId}/cancel:
    parameters:
      - $ref: "#/components/parameters/MovementId"
    post:
      operationId: postApiV1InventoryMovementsMovementIdCancel
      tags: [movements]
      summary: Cancel draft movement
      security:
        - JwtAuth: []
      responses:
        "200":
          description: Cancelled movement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovementSuccessEnvelope"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"
components:
  securitySchemes:
    JwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token JWT; tenant scope from claims.
  parameters:
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WarehouseId:
      name: warehouseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MovementId:
      name: movementId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Client-supplied key for safe retries (ARCHITECTURE §9). Paired with a SHA-256 fingerprint of the raw JSON body on the server.
        Sending the same key with the same raw body returns the existing draft (no duplicate rows). Same key with a different body yields 409 `IDEMPOTENCY_CONFLICT`.
      schema:
        type: string
        maxLength: 255
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Search:
      name: search
      in: query
      schema:
        type: string
    Sort:
      name: sort
      in: query
      schema:
        type: string
        description: Field name to sort by (domain-specific)
    Order:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc
  responses:
    UnauthorizedError:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequestError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotImplementedError:
      description: Endpoint not implemented yet
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ConflictError:
      description: Resource conflict (e.g. duplicate name)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntityError:
      description: Domain rule violation (e.g. cannot delete category with active products)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    PlainTextOk:
      type: string
      description: Plain-text OK marker for probes
      example: ok
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Machine-readable error message
    PaginationMeta:
      type: object
      required:
        - page
        - per_page
        - total
        - total_pages
      properties:
        page:
          type: integer
          format: int32
        per_page:
          type: integer
          format: int32
        total:
          type: integer
          format: int64
        total_pages:
          type: integer
          format: int32
    SuccessMeta:
      type: object
      description: §9 meta for JSON success responses (list endpoints include pagination).
      properties:
        request_id:
          type: string
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
    CategorySuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/Category"
        meta:
          $ref: "#/components/schemas/SuccessMeta"
    ProductSuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/Product"
        meta:
          $ref: "#/components/schemas/SuccessMeta"
    WarehouseSuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/Warehouse"
        meta:
          $ref: "#/components/schemas/SuccessMeta"
    Category:
      type: object
      required:
        - id
        - tenant_id
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        parent_id:
          type: string
          format: uuid
          nullable: true
        sort_order:
          type: integer
          format: int32
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
    CategoryCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        parent_id:
          type: string
          format: uuid
          nullable: true
        sort_order:
          type: integer
          format: int32
    CategoryUpdateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        parent_id:
          type: string
          format: uuid
          nullable: true
        sort_order:
          type: integer
          format: int32
    CategoryListResponse:
      type: object
      required: [success, data, meta]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        meta:
          $ref: "#/components/schemas/SuccessMeta"
    Product:
      type: object
      required:
        - id
        - tenant_id
        - sku
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
          nullable: true
        sku:
          type: string
        name:
