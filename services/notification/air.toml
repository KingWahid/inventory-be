root = "."
tmp_dir = "tmp/notification"

[build]
cmd = "go build -o ./tmp/notification/server ./services/notification/cmd/server"
bin = "./tmp/notification/server"
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "json"]
exclude_dir = ["tmp", ".git", "vendor", "services/inventory", "services/authentication", "workers", "docs", "devtools"]
delay = 500
stop_on_error = true

[log]
time = true
