root = "."
tmp_dir = "tmp/authentication"

[build]
cmd = "go build -o ./tmp/authentication/server ./services/authentication/cmd/server"
bin = "./tmp/authentication/server"
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "json"]
# Skip other apps so the first Air pass does not walk the whole monorepo (slow cold start vs Docker healthchecks).
exclude_dir = ["tmp", ".git", "vendor", "services/inventory", "services/notification", "workers", "docs", "devtools"]
delay = 500
stop_on_error = true

[log]
time = true
