openapi: 3.0.3
info:
  title: Authentication Service API
  version: 0.3.0
  description: |
    Tenant scope is derived from the JWT (`tenant_id` claim), not from `X-Tenant-Id`.
    JSON errors: §9 envelope via `APIErrorEnvelope`. JSON success for login/register: §9 via `LoginSuccessEnvelope` / `RegisterSuccessEnvelope` (`success`, `data`, optional `meta.request_id`).
    Probes `/health`, `/ready`, `/api/v1/auth/health` remain `text/plain`, not §9 JSON.
servers:
  - url: /
paths:
  /api/v1/auth/login:
    post:
      operationId: postApiV1AuthLogin
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessEnvelope'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/register:
    post:
      operationId: postApiV1AuthRegister
      tags: [auth]
      summary: Register tenant and first admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "201":
          description: Tenant and admin created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterSuccessEnvelope'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Resource conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/refresh:
    post:
      operationId: postApiV1AuthRefresh
      tags: [auth]
      summary: Refresh access token
      description: Placeholder until refresh-token storage is implemented (BACKEND_TASKS 3.1).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        "200":
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "501":
          description: Not implemented yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/logout:
    post:
      operationId: postApiV1AuthLogout
      tags: [auth]
      summary: Log out (invalidate refresh session)
      description: Requires Bearer JWT. Implementation pending (BACKEND_TASKS 3.1).
      security:
        - JwtAuth: []
      responses:
        "204":
          description: Logged out
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "501":
          description: Not implemented yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/me:
    get:
      operationId: getApiV1AuthMe
      tags: [auth]
      summary: Current user profile
      description: Requires Bearer JWT (`sub` = user id).
      security:
        - JwtAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "501":
          description: Not implemented yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Liveness probe
      responses:
        "200":
          description: Service is alive
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextOk'
  /ready:
    get:
      operationId: getReady
      tags: [health]
      summary: Readiness probe
      responses:
        "200":
          description: Service dependencies are ready
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextOk'
        "503":
          description: Service is not ready
          content:
            text/plain:
              schema:
                type: string
                example: db not ready
  /api/v1/auth/health:
    get:
      operationId: getApiV1AuthHealth
      tags: [auth]
      summary: Authentication API health
      responses:
        "200":
          description: API is healthy
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextOk'
components:
  securitySchemes:
    JwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token JWT; includes tenant_id claim.
  schemas:
    APIErrorEnvelope:
      type: object
      required: [success, error]
      description: Runtime JSON for 4xx/5xx from authentication Echo HTTPErrorHandler (ARCHITECTURE §9).
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: '#/components/schemas/ErrorPayload'
        meta:
          type: object
          additionalProperties: true
    ErrorPayload:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        message_id:
          type: string
          description: Stable key for future i18n
        details:
          type: object
          additionalProperties: true
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: Refresh token (opaque or JWT per product decision)
    RefreshResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          format: int64
    MeResponse:
      type: object
      required:
        - user_id
        - tenant_id
        - email
      properties:
        user_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
          description: May be empty if not set
    ErrorResponse:
      type: object
      description: >-
        Legacy flat schema kept for references; live 4xx/5xx bodies use APIErrorEnvelope (nested `error` object).
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Request body or params is invalid
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: jane@acme.test
        password:
          type: string
          minLength: 8
          example: strong-password-123
    LoginResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: JWT access token (token_type=access)
        refresh_token:
          type: string
          description: JWT refresh token (token_type=refresh); send only to POST /api/v1/auth/refresh until logout/session store ships
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          format: int64
          description: Access token expiration in seconds
    RegisterRequest:
      type: object
      required:
        - tenant_name
        - admin_name
        - admin_email
        - password
      properties:
        tenant_name:
          type: string
          minLength: 2
          maxLength: 255
          example: Acme Corp
        admin_name:
          type: string
          minLength: 2
          maxLength: 255
          example: Jane Doe
        admin_email:
          type: string
          format: email
          example: jane@acme.test
        password:
          type: string
          minLength: 8
          example: strong-password-123
    RegisterResponse:
      type: object
      required:
        - tenant_id
        - user_id
        - email
      properties:
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
    PlainTextOk:
      type: string
      description: Plain-text OK marker for probes
      example: ok
    SuccessMeta:
      type: object
      description: §9 meta for successful JSON responses (optional fields).
      properties:
        request_id:
          type: string
        pagination:
          type: object
          description: Present only for list endpoints (not used on auth login/register).
          additionalProperties: true
    LoginSuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/LoginResponse'
        meta:
          $ref: '#/components/schemas/SuccessMeta'
    RegisterSuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/RegisterResponse'
        meta:
          $ref: '#/components/schemas/SuccessMeta'
