openapi: 3.0.3
info:
  title: Authentication Service API
  version: 0.1.0
servers:
  - url: /
paths:
  /api/v1/auth/login:
    post:
      operationId: postApiV1AuthLogin
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/register:
    post:
      operationId: postApiV1AuthRegister
      tags: [auth]
      summary: Register tenant and first admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "201":
          description: Tenant and admin created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Resource conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Liveness probe
      responses:
        "200":
          description: Service is alive
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextOk'
  /ready:
    get:
      operationId: getReady
      tags: [health]
      summary: Readiness probe
      responses:
        "200":
          description: Service dependencies are ready
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextOk'
        "503":
          description: Service is not ready
          content:
            text/plain:
              schema:
                type: string
                example: db not ready
  /api/v1/auth/health:
    get:
      operationId: getApiV1AuthHealth
      tags: [auth]
      summary: Authentication API health
      responses:
        "200":
          description: API is healthy
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextOk'
components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Request body or params is invalid
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: jane@acme.test
        password:
          type: string
          minLength: 8
          example: strong-password-123
    LoginResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: JWT access token
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          format: int64
          description: Access token expiration in seconds
    RegisterRequest:
      type: object
      required:
        - tenant_name
        - admin_name
        - admin_email
        - password
      properties:
        tenant_name:
          type: string
          minLength: 2
          maxLength: 255
          example: Acme Corp
        admin_name:
          type: string
          minLength: 2
          maxLength: 255
          example: Jane Doe
        admin_email:
          type: string
          format: email
          example: jane@acme.test
        password:
          type: string
          minLength: 8
          example: strong-password-123
    RegisterResponse:
      type: object
      required:
        - tenant_id
        - user_id
        - email
      properties:
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
    PlainTextOk:
      type: string
      description: Plain-text OK marker for probes
      example: ok
