name: inventory-backend

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventory"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  inventory-api:
    build:
      context: .
      dockerfile: services/inventory/docker/Dockerfile
      target: dev
    working_dir: /src
    command: ["air", "-c", "services/inventory/air.toml"]
    environment:
      APP_ENV: development
      APP_PORT: "8080"
      DB_DSN: host=postgres user=inventory password=inventory_password dbname=inventory sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev-secret-change-in-prod
    expose:
      - "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./:/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      # Air cold build + go mod download can exceed 20s on first start
      start_period: 120s

  notification-service:
    build:
      context: .
      dockerfile: services/notification/docker/Dockerfile
      target: dev
    working_dir: /src
    command: ["air", "-c", "services/notification/air.toml"]
    environment:
      APP_ENV: development
      APP_PORT: "8081"
      DB_DSN: host=postgres user=inventory password=inventory_password dbname=inventory sslmode=disable
      REDIS_ADDR: redis:6379
    expose:
      - "8081"
    ports:
      - "8081:8081"
    volumes:
      - ./:/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 120s

  authentication-service:
    build:
      context: .
      dockerfile: services/authentication/docker/Dockerfile
      target: dev
    working_dir: /src
    command: ["air", "-c", "services/authentication/air.toml"]
    environment:
      APP_ENV: development
      APP_PORT: "8082"
      DB_DSN: host=postgres user=inventory password=inventory_password dbname=inventory sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev-secret-change-in-prod
    expose:
      - "8082"
    ports:
      - "8082:8082"
    volumes:
      - ./:/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8082/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 120s

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
      target: dev
    working_dir: /src
    command: ["air", "-c", "workers/air.toml"]
    volumes:
      - ./:/src
    environment:
      DB_DSN: host=postgres user=inventory password=inventory_password dbname=inventory sslmode=disable
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./infra/kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      inventory-api:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      authentication-service:
        condition: service_healthy

volumes:
  pgdata:
