root = "."
tmp_dir = "tmp/worker"

[build]
cmd = "go build -o ./tmp/worker/worker ./workers/cmd/worker"
bin = "./tmp/worker/worker"
args_bin = ["--mode=all"]
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "json"]
exclude_dir = ["tmp", ".git", "vendor", "services", "docs", "devtools"]
delay = 500
stop_on_error = true

[log]
time = true
